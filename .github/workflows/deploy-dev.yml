# This is a basic workflow to help you get started with Actions.
name: 🚀 Deploy COPA Client to Development

# Controls when the action will run.
on:
    # Triggers the workflow on push or pull request events but only for the main branch
    push:
      branches:
        - develop

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
    # This workflow contains a single job called "build"
    deploy-dev:
        # The type of runner that the job will run on
        runs-on: ubuntu-latest

        # Steps represent a sequence of tasks that will be executed as part of the job
        steps:
        - name: 'Create env file'
          run: |
            echo "${{ secrets.DOT_ENV_DEVELOPMENT }}" > .env
    
        - name: Copy .env file to server using SCP
          uses: appleboy/scp-action@master
          with:
            host: ${{ secrets.DEV_HOST }}
            username: ${{ secrets.DEV_USERNAME }}
            key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
            source: ".env"
            target: ${{ secrets.DEV_SERVER_PATH }}

        - name: Deploy to production
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.DEV_HOST }}
            username: ${{ secrets.DEV_USERNAME }}
            key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
            port: 22
            script: |
              set -e # Exit immediately if any command fails
              echo "➡️ Navigating to project directory..."
              cd ${{ secrets.DEV_SERVER_PATH }}

              echo "🔄 Pulling latest code from development branch..."
              git fetch --all
              git reset --hard origin/develop # A safer alternative to a pure pull for deployments

              echo "📦 Installing dependencies..."
              npm install

              echo "🏗️ Building application..."
              NODE_OPTIONS="--max-old-space-size=2048" npm run build

              echo "✅ Deployment successful! Application is live."
