# This is a basic workflow to help you get started with Actions.
name: 🚀 Deploy COPA Client to Production

# Controls when the action will run.
on:
    # Triggers the workflow on push or pull request events but only for the main branch
    push:
      branches:
        - main

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
    # This workflow contains a single job called "build"
    deploy-prod:
        # The type of runner that the job will run on
        runs-on: ubuntu-latest

        # Steps represent a sequence of tasks that will be executed as part of the job
        steps:
        - name: 'Create env file'
          run: |
            echo "${{ secrets.DOT_ENV_PRODUCTION }}" > .env
    
        - name: Copy .env file to server using SCP
          uses: appleboy/scp-action@master
          with:
            host: ${{ secrets.PROD_HOST }}
            username: ${{ secrets.PROD_USERNAME }}
            key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
            source: ".env"
            target: ${{ secrets.PROD_SERVER_PATH }}

        - name: Deploy to production
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.PROD_HOST }}
            username: ${{ secrets.PROD_USERNAME }}
            key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
            port: 22
            script: |
                set -e # Exit immediately if any command fails
                echo "➡️ Navigating to project directory..."
                cd ${{ secrets.PROD_SERVER_PATH }}

                echo "💾 Ensuring swap space..."
                if [ ! -f /swapfile ]; then
                    sudo fallocate -l 2G /swapfile
                    sudo chmod 600 /swapfile
                    sudo mkswap /swapfile
                    sudo swapon /swapfile
                    echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
                fi

                echo "🔄 Pulling latest code from development branch..."
                git fetch --all
                git reset --hard origin/main # A safer alternative to a pure pull for deployments

                echo "📦 Installing dependencies..."
                npm install  --legacy-peer-deps --no-audit --prefer-offline

                echo "🏗️ Building application..."
                NODE_OPTIONS="--max-old-space-size=2048" npm run build

                echo "✅ Deployment successful! Application is live."
